<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesion - Gestion Estudiantil</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <h1>🎓 Gestion Estudiantil</h1>
            <h2>Iniciar Sesion</h2>

            {% with messages = get_flashed_messages(with_categories=true) %}
              {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
              {% endfor %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login') }}">
                <label>Selecciona tu usuario:</label>
                <select name="username" required onchange="actualizarNombre(this)">
                    <option value="">-- Seleccionar usuario --</option>
                    {% for u in usuarios %}
                    <option value="{{ u.username }}">
                        {{ u.nombre }} {% if u.rol == 'admin' %}(Admin){% endif %}
                    </option>
                    {% endfor %}
                </select>

                <label>Contrasena:</label>
                <input type="password" name="password" placeholder="Ingresa tu contrasena" required>

                <button type="submit" class="btn btn-login">Ingresar</button>
            </form>
        </div>
    </div>
</body>
</html>
